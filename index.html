<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Food Truth Scanner</title>
  
  <!-- Modern Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="app.css">
  
  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4ade80">
  <link rel="apple-touch-icon" href="https://via.placeholder.com/192x192.png?text=Icon192">
</head>
<body>
  <div id="app-container" class="mobile-app">
    
    <!-- View 1: Main Search & Scanner -->
    <section id="view-home" class="view active-view">
      <header class="app-header">
        <h1>Truth <span class="accent-text">Scanner</span></h1>
        <p class="subtitle">Discover what's really in your food</p>
      </header>

      <div class="search-container">
        <div class="search-bar glass-panel">
          <i class="ri-search-line"></i>
          <input type="text" id="searchInput" placeholder="Search product or brand..." autocomplete="off">
        </div>
        <div id="searchResults" class="search-results hidden">
          <!-- Dynamic results inserted here -->
        </div>
      </div>

      <div class="scanner-launcher">
        <div class="scanner-btn" id="startScanBtn">
          <div class="scan-ring">
            <i class="ri-barcode-box-line"></i>
          </div>
          <span>Tap to Scan Barcode</span>
        </div>
      </div>

      <div id="scanner-modal" class="modal hidden">
        <div class="modal-content glass-panel">
          <button id="closeScannerBtn" class="close-btn"><i class="ri-close-line"></i></button>
          <h2>Scan Product Barcode</h2>
          <div id="reader"></div>
          <p class="scanner-hint">Align barcode within the frame</p>
        </div>
      </div>
    </section>

    <!-- View 2: Analysis Report -->
    <section id="view-report" class="view hidden">
      <header class="report-header">
        <button id="backBtn" class="icon-btn"><i class="ri-arrow-left-line"></i></button>
        <h2>Health Report</h2>
        <div class="placeholder"></div>
      </header>

      <div id="report-content" class="report-content">
        <!-- Rendered dynamically -->
      </div>
    </section>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden glass-panel">
      <div class="spinner"></div>
      <p id="loadingMsg">Analyzing Product...</p>
    </div>
  </div>

  <!-- Barcode Scanner Library -->
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  
  <!-- App Logic -->
  <script src="app.js"></script>

  <!-- Service Worker Registration for PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(registration => console.log('ServiceWorker registered'))
          .catch(err => console.log('ServiceWorker registration failed: ', err));
      });
    }
  </script>
</body>
</html>
